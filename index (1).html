<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عمار سنان السينمائية - الإصدار الكروي</title>
    <style>
        :root {
            --gold: #d4af37;
            --navy: #0a0f1d;
        }

        body {
            background-color: var(--navy);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow: hidden; /* لمنع التمرير وضمان تجربة سينمائية */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر الخاص بك */
        .header-section {
            text-align: center;
            margin-top: 20px;
            z-index: 10;
        }

        .main-header {
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* حاوية الكرة */
        #scene {
            width: 100vw;
            height: 70vh;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #sphere {
            position: relative;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            animation: rotateSphere 25s infinite linear;
        }

        .photo {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            backface-visibility: visible;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: all 0.5s ease;
        }

        .photo:hover {
            box-shadow: 0 0 30px var(--gold);
            transform: scale(1.1) !important;
        }

        @keyframes rotateSphere {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(180deg); }
        }

        /* لوحة التحكم (الرفع) */
        .controls {
            position: fixed;
            bottom: 30px;
            z-index: 100;
            background: rgba(10, 15, 29, 0.9);
            padding: 15px 30px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            text-align: center;
        }

        .upload-btn {
            background: linear-gradient(45deg, var(--gold), #f9f295);
            color: #000;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }

        input[type="file"] { display: none; }

        .footer-text {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="main-header">منصة عمار سنان السينمائية</div>
        <div style="color: #94a3b8; font-size: 0.8rem;">الإصدار الكروي الـ 3D المطور</div>
    </div>

    <div id="scene">
        <div id="sphere">
            </div>
    </div>

    <div class="controls">
        <label class="upload-btn">
            اختر صورك السينمائية
            <input type="file" id="imageInput" multiple accept="image/*">
        </label>
        <div class="footer-text">تصميم وبرمجة المهندس المبدع - 2026</div>
    </div>

    <script>
        const sphere = document.getElementById('sphere');
        const input = document.getElementById('imageInput');

        input.onchange = function(e) {
            const files = e.target.files;
            if (files.length === 0) return;

            sphere.innerHTML = ''; // تنظيف الكرة الحالية
            
            const total = files.length;
            const radius = 250; // نصف قطر الكرة

            for (let i = 0; i < total; i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const div = document.createElement('div');
                    div.className = 'photo';
                    div.style.backgroundImage = `url(${event.target.result})`;

                    // توزيع فيبوناتشي لتوزيع الصور بشكل عادل على سطح الكرة
                    const phi = Math.acos(-1 + (2 * i) / total);
                    const theta = Math.sqrt(total * Math.PI) * phi;

                    const x = radius * Math.cos(theta) * Math.sin(phi);
                    const y = radius * Math.sin(theta) * Math.sin(phi);
                    const z = radius * Math.cos(phi);

                    // توجيه الصور لتواجه المركز أو الخارج
                    div.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${theta}rad) rotateX(${phi}rad)`;
                    
                    sphere.appendChild(div);
                };
                reader.readAsDataURL(files[i]);
            }
        };
    </script>
</body>
</html>
