
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STU-AMAR 3D LUXURY</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#d4af37">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- External Libraries for Recording & Audio Visuals -->
    <script src="https://unpkg.com/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --gold-shine: linear-gradient(135deg, #d4af37 0%, #fcf6ba 50%, #aa8912 100%);
            --dark: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--dark);
            color: white;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Luxury Header */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            border-bottom: 2px solid #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .brand-logo {
            font-weight: 900;
            font-size: 1.4rem;
            background: var(--gold-shine);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .controls { display: flex; gap: 10px; align-items: center; }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-gold { background: var(--gold-shine); color: #000; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); }
        .btn-red { background: #e11d48; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

        /* Main 3D Stage */
        .stage {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        /* Initial Upload UI (The Circle from Ammar's screenshot) */
        #upload-overlay {
            position: absolute;
            inset: 0;
            background: var(--dark);
            z-index: 80;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-circle {
            width: 220px;
            height: 220px;
            border: 2px dashed var(--gold);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            background: rgba(212, 175, 55, 0.03);
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-circle:hover { background: rgba(212, 175, 55, 0.08); transform: scale(1.02); }

        .upload-icon { font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--gold)); }
        
        .upload-text h2 { margin: 0; color: #fff; font-size: 1.5rem; }
        .upload-text p { color: #777; margin: 8px 0 20px 0; font-size: 0.9rem; }
        
        .browse-link { 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 1.1rem; 
            border-bottom: 2px solid var(--gold);
            padding-bottom: 2px;
        }

        /* 3D Cylinder System */
        .cylinder {
            width: 260px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            visibility: hidden; /* Hidden until images are loaded */
        }

        .panel {
            position: absolute;
            inset: 0;
            border: 2px solid var(--gold);
            border-radius: 18px;
            background: var(--panel-bg);
            overflow: hidden;
            backface-visibility: hidden;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel img { width: 100%; height: 100%; object-fit: cover; }

        /* Accurate 8 Panel Distribution */
        .panel:nth-child(1) { transform: rotateY(0deg) translateZ(350px); }
        .panel:nth-child(2) { transform: rotateY(45deg) translateZ(350px); }
        .panel:nth-child(3) { transform: rotateY(90deg) translateZ(350px); }
        .panel:nth-child(4) { transform: rotateY(135deg) translateZ(350px); }
        .panel:nth-child(5) { transform: rotateY(180deg) translateZ(350px); }
        .panel:nth-child(6) { transform: rotateY(225deg) translateZ(350px); }
        .panel:nth-child(7) { transform: rotateY(270deg) translateZ(350px); }
        .panel:nth-child(8) { transform: rotateY(315deg) translateZ(350px); }

        footer {
            padding: 8px;
            background: #000;
            text-align: center;
            font-size: 11px;
            color: #555;
            border-top: 1px solid #111;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <div class="brand-logo">STU-AMAR PRO</div>
    <div class="controls">
        <button id="mute-btn" class="btn btn-outline">🔇 صامت</button>
        <button id="rec-btn" class="btn btn-red">تصدير فديو 🎬</button>
    </div>
</header>

<div class="stage">
    <!-- UI التصفح والرفع -->
    <div id="upload-overlay">
        <label for="file-input" class="upload-circle">
            <div class="upload-icon">✨</div>
            <div class="upload-text">
                <h2>لا توجد صور</h2>
                <p>اختر 8 صور لبدء العرض الملكي</p>
            </div>
            <span class="browse-link">تصفح الملفات ></span>
        </label>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple>

    <!-- الأسطوانة الثلاثية -->
    <div class="cylinder" id="main-cylinder">
        <div class="panel"><img></div>
        <div class="panel"><img></div>
        <div class="panel"><img></div>
        <div class="panel"><img></div>
        <div class="panel"><img></div>
        <div class="panel"><img></div>
        <div class="panel"><img></div>
        <div class="panel"><img></div>
    </div>
</div>

<footer>حقوق التصميم محفوظة لعمار سنان &copy; 2026</footer>

<!-- Audio Engine -->
<audio id="bg-audio" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
    const fileInput = document.getElementById('file-input');
    const overlay = document.getElementById('upload-overlay');
    const cylinder = document.getElementById('main-cylinder');
    const imgs = document.querySelectorAll('.panel img');
    const bgAudio = document.getElementById('bg-audio');
    const muteBtn = document.getElementById('mute-btn');
    const recBtn = document.getElementById('rec-btn');

    let rotation = 0;
    let isRecording = false;
    let musicOn = false;

    // 1. نظام الرفع وحفظ البيانات (LocalStorage)
    fileInput.onchange = function() {
        const files = Array.from(this.files);
        if(files.length > 0) {
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                cylinder.style.visibility = "visible";
            }, 800);
            
            files.forEach((file, i) => {
                if (i < 8) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imgs[i].src = e.target.result;
                        localStorage.setItem('amar_img_' + i, e.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
            startMusic();
        }
    };

    // 2. تشغيل الموسيقى
    function startMusic() {
        bgAudio.play();
        musicOn = true;
        muteBtn.innerText = "🔊 موسيقى";
    }

    muteBtn.onclick = () => {
        if(musicOn) {
            bgAudio.pause();
            muteBtn.innerText = "🔇 صامت";
        } else {
            bgAudio.play();
            muteBtn.innerText = "🔊 موسيقى";
        }
        musicOn = !musicOn;
    };

    // 3. محرك الدوران ثلاثي الأبعاد
    function render() {
        if(!isRecording) rotation += 0.6;
        cylinder.style.transform = `rotateY(${rotation}deg)`;
        requestAnimationFrame(render);
    }
    render();

    // 4. نظام تصدير الفديو (CCapture)
    const capturer = new CCapture({ format: 'webm', framerate: 30, name: 'STU-AMAR-3D' });

    recBtn.onclick = function() {
        if (isRecording) return;
        isRecording = true;
        this.innerText = "جاري الحفظ... ⏳";
        
        capturer.start();
        let frames = 0;
        
        function captureLoop() {
            if (frames < 180) { // 6 seconds
                rotation += 2;
                cylinder.style.transform = `rotateY(${rotation}deg)`;
                capturer.capture(document.body);
                frames++;
                requestAnimationFrame(captureLoop);
            } else {
                capturer.stop();
                capturer.save();
                isRecording = false;
                recBtn.innerText = "تصدير فديو 🎬";
            }
        }
        captureLoop();
    };

    // استرجاع الصور المحفوظة تلقائياً
    window.onload = () => {
        let hasSaved = false;
        for(let i=0; i<8; i++) {
            const data = localStorage.getItem('amar_img_' + i);
            if(data) {
                imgs[i].src = data;
                hasSaved = true;
            }
        }
        if(hasSaved) {
            overlay.style.display = "none";
            cylinder.style.visibility = "visible";
        }
    };
</script>

</body>
</html>
